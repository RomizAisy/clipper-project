<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aspect Ratio Converter</title>

    <style>
        #bar {
            width: 0%;
            height: 20px;
            background-color: green;
        }

        #progress {
            width: 100%;
            background-color: #ddd;
        }

        .job-card {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<h1>🎬 Aspect Ratio Converter</h1>
<a href="{{ url_for('home') }}">Home</a>

<form id="uploadForm" action="/aspect-change" method="POST" enctype="multipart/form-data">
    {{ form.hidden_tag() }}

    <div class="field">
        {{ form.file.label }}
        {{ form.file() }}
    </div>

    <div class="divider">OR</div>

    <div class="field">
        {{ form.video_url.label }}
        {{ form.video_url(placeholder="Paste YouTube / TikTok link") }}
    </div>

    <div class="field">
        {{ form.submit(class="btn") }}
    </div>
</form>

<div id="progress">
    <div id="bar"></div>
    <p id="statusText">Waiting...</p>
</div>
</body>
