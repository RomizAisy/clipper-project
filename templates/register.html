<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    <h1>Flask Register Page</h1>
    <form action="/register" method="POST">
        {{form.csrf_token}}

        {{form.username.label}}
        {{form.username(size=20)}}

        {{form.email.label}}
        {{form.email}}

        {{form.password.label}}
        {{form.password}}
        <input type="submit" value="Register">
    </form>
    <a href="{{url_for('home')}}">Back to Homepage</a>
    <a href="{{url_for('auth.login')}}">Go to Login Page</a>

</body>
</html>
