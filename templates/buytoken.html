{% extends "_base.html" %}

{% block title %}Buy Token{% endblock %}

{% block content %}

<section class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-md w-full bg-white shadow-lg rounded-2xl p-8 text-center space-y-6">
        <h1 class="text-3xl font-bold">Buy Tokens</h1>
        <p class="text-gray-500">Choose a package to continue using Clippera's premium features.</p>

        <!-- Token Packages -->
        <div class="grid gap-4">
            <!-- Starter Package -->
            <button onclick="buy('starter')"
                    class="w-full bg-black text-white py-3 rounded-xl font-medium
                           hover:bg-white hover:text-black border border-black transition">
                Starter Package – 50 tokens
            </button>

            <!-- Pro Package -->
            <button onclick="buy('pro')"
                    class="w-full bg-black text-white py-3 rounded-xl font-medium
                           hover:bg-white hover:text-black border border-black transition">
                Pro Package – 200 tokens
            </button>
        </div>

        <p class="text-gray-400 text-sm mt-4">
            Payments powered by Midtrans Snap
        </p>
    </div>



</section>
{% endblock %}
{% block scripts %}

    <script>
        function buy(packageName) {
            fetch("/create-transaction", {
                method: "POST",
                credentials: "same-origin",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ package: packageName })
            })
            .then(res => res.json())
            .then(data => {
                if (data.snap_token) {
                    snap.pay(data.snap_token, {
                        onSuccess: function (result) {
                            window.location.href = "/payment-success";
                        },
                        onPending: function (result) {
                            window.location.href = "/payment-pending";
                        },
                        onError: function (result) {
                            alert("Payment failed. Please try again.");
                        }
                    });
                } else {
                    alert("Payment error. Please try again.");
                }
            })
            .catch(err => {
                console.error(err);
                alert("Something went wrong. Please try again.");
            });
        }
    </script>


{% endblock %}
